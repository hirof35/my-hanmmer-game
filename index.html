<!DOCTYPE html>
<html>
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>body { margin: 0; overflow: hidden; } canvas { display: block; }</style>
</head>
<body>
    <div id="ui" style="position: absolute; top: 10px; left: 10px; color: white; font-family: sans-serif; pointer-events: none;">
        <h1>ハンマー投げゲーム</h1>
        <p>マウスで振り回し、離して投げろ！</p>
        <div id="score">ベスト: 0m</div>
    </div>

<script>
const { Engine, Render, Runner, World, Bodies, Body, Constraint, Mouse, MouseConstraint, Events } = Matter;

const engine = Engine.create(), world = engine.world;
const render = Render.create({ element: document.body, engine: engine, options: { width: window.innerWidth, height: window.innerHeight, wireframes: false } });

// キャラクターとハンマー
const person = Bodies.circle(400, 400, 20, { isStatic: true });
const hammer = Bodies.circle(500, 400, 15, { render: { fillStyle: 'red' } });
const swing = Constraint.create({ bodyA: person, bodyB: hammer, length: 100, stiffness: 0.1 });

World.add(world, [person, hammer, swing, Bodies.rectangle(400, 600, 1200, 20, { isStatic: true })]);

let isFlying = false;
const mouse = Mouse.create(render.canvas);
const mouseConstraint = MouseConstraint.create(engine, { mouse: mouse });
World.add(world, mouseConstraint);

// リリース判定
Events.on(mouseConstraint, 'enddrag', (e) => {
    if (e.body === hammer) {
        World.remove(world, swing);
        isFlying = true;
        setTimeout(calculateResult, 2000);
    }
});

function calculateResult() {
    const dist = Math.abs(hammer.position.x - 400);
    const score = Math.floor(dist / 10);
    alert(`記録: ${score}m!`);
    
    // localStorage保存
    let best = localStorage.getItem('best') || 0;
    if(score > best) localStorage.setItem('best', score);
    document.getElementById('score').innerText = `ベスト: ${localStorage.getItem('best')}m`;
    location.reload(); // リセット
}

// カメラ追従 (Lerp)
let cam = { x: 400, y: 400 };
Events.on(render, 'beforeRender', () => {
    if (isFlying) {
        cam.x += (hammer.position.x - cam.x) * 0.05;
        Render.lookAt(render, { min: { x: cam.x - 400, y: cam.y - 300 }, max: { x: cam.x + 400, y: cam.y + 300 } });
    }
});

Render.run(render);
Runner.run(Runner.create(), engine);
</script>
</body>
</html>
